apiVersion: apps/v1
kind: Deployment
metadata:
  name: otbr-server
  namespace: home-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otbr
  template:
    metadata:
      labels:
        app: otbr
    spec:
      hostNetwork: true
      containers:
        - name: otbr
          image: openthread/otbr:latest
          securityContext:
            privileged: true
          env:
            - name: NAT64
              value: "0"
            - name: FIREWALL
              value: "0"
            - name: RADIO_URL
              value: "spinel+hdlc+uart:///dev/ttyPoE"
          command: ["/bin/bash", "-c"]
          args:
            - |
              apt-get update && apt-get install -y socat;
              socat -d -d PTY,link=/dev/ttyPoE,raw,echo=0,waitslave TCP:192.168.1.168:6638 &
              echo "Waiting for /dev/ttyPoE..."
              for i in {1..30}; do
                [ -e /dev/ttyPoE ] && break
                sleep 1
              done

              # Force the configuration file to use our PTY
              echo 'OTBR_AGENT_OPTS="-I wpan0 -B eth0 --rest-listen-address 0.0.0.0 spinel+hdlc+uart:///dev/ttyPoE trel://eth0"' > /etc/default/otbr-agent

              /app/script/server
              tail -f /dev/null
          # Added: Restart the pod if the OTBR agent stops responding
          livenessProbe:
            exec:
              command:
                - ot-ctl
                - state
            initialDelaySeconds: 60
            periodSeconds: 30
          ports:
            - containerPort: 80
              name: web-gui
            - containerPort: 8081
              name: ot-agent
---
apiVersion: v1
kind: Service
metadata:
  name: otbr-service
  namespace: home-assistant
spec:
  type: ClusterIP
  selector:
    app: otbr
  ports:
    - name: web-gui
      protocol: TCP
      port: 80
      targetPort: 80
    - name: ot-agent
      protocol: TCP
      port: 8081
      targetPort: 8081
